<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - Smartway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f1f5f9; color: #1e293b; padding-bottom: 120px; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .history-container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .header-area { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; margin-top: 10px; }
        .back-btn {
            width: 40px; height: 40px; background: #1e293b; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: white; text-decoration: none;
            box-shadow: 0 4px 10px rgba(30, 41, 59, 0.15); transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.95); }

        .history-item {
            background: white; border-radius: 20px;
            padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            animation: slideUp 0.4s ease;
        }
        .hist-info b { font-size: 18px; color: #ff8c00; display: block; font-weight: 800; }
        .hist-info small { color: #64748b; font-size: 11px; font-weight: 700; margin-top: 4px; display: inline-block; }
        
        /* 🌟 STATUS PILLS DESIGN MODULE */
        .status-pill { padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-approved { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-rejected { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; font-weight: 600; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; color: #ff8c00; opacity: 0.7; }

        /* 🌟 FLOATING NAV OVERRIDES SYSTEM BAR */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: #1e293b; border-radius: 25px;
            display: flex; justify-content: space-around; padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999;
        }
        .nav-item { color: #94a3b8; font-size: 20px; cursor: pointer; transition: 0.3s; padding: 8px 16px; border-radius: 14px; }
        .nav-item:hover { color: white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="history-container">
        <div class="header-area">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div>
                <h2 style="font-size: 22px; margin: 0; font-weight: 800;">Withdrawal History</h2>
                <p style="font-size: 13px; color: #64748b; margin: 4px 0 0 0; font-weight: 600;">Track your payment requests</p>
            </div>
        </div>

        <div id="history-list">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Fetching your transactions...</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="location.href='refer.html'"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="location.href='team.html'"><i class="fas fa-user-plus"></i></div>
        <div class="nav-item" onclick="window.logout()"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.0"></script>
    <script src="app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            // Validation gateway entry token logic check
            if(!localStorage.getItem('user_id')) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                if(typeof window.loadHistory === 'function') {
                    await window.loadHistory();
                } else {
                    document.getElementById('history-list').innerHTML = 
                        '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>loadHistory function missing in app.js</p></div>';
                }
            } catch (err) {
                console.error("History module crash exception:", err);
                document.getElementById('history-list').innerHTML = 
                    '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading transaction records.</p></div>';
            }
        });
    </script>
</body>
</html>
